<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Properties</title>
    <!-- import the styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CSS Properties</h1>
    <section class="section-text">
      <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Unde commodi
        libero, nam quos aspernatur praesentium illo incidunt assumenda. Quia,
        iure.
      </p>
    </section>
    <!-- CSS Box Model: a web design concept which applies to all elements defining spacing, border, and content in layout. -->
    <div class="box-model">
      This box has a background color, border, and padding.
    </div>
    <div class="styled-box">
      This box has no background color, border, radius, and shadow.
    </div>
  </body>
</html>
